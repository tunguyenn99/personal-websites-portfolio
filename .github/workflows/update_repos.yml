name: Daily Repos Update

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động vào lúc 0:00 UTC (khoảng 7h sáng giờ VN) mỗi ngày
  workflow_dispatch: # Cho phép bạn bấm nút Run manuel bằng tay trên giao diện Github Actions

jobs:
  update-repos-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho bot tự tạo commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run parse_repos.py
        run: python parse_repos.py

      - name: Check if there are any changes
        id: git-check
        run: |
          git diff --exit-code repos_analysis.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add repos_analysis.json
          git commit -m "chore(auto): daily update repos_analysis.json"
          git push
